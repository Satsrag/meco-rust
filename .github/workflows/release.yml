# Release pipeline (download model): on a version tag, build every platform artifact from the one
# Rust core and attach them to a GitHub Release for download. No registry publishing — no accounts
# or secrets needed (only the auto-provided GITHUB_TOKEN to create the Release).
#
# Assumes meco-rust is its own repository (root = this directory).
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the Release + upload assets

jobs:
  # C ABI: static (.a/.lib) + dynamic (.so/.dylib/.dll) + meco.h, per platform — for C / Go-cgo /
  # Python / Dart / Java / any language that loads a C library.
  c-libs:
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  name: linux-x86_64 }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, name: linux-aarch64, cross: true }
          - { os: macos-latest,   target: aarch64-apple-darwin,      name: macos-arm64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,       name: macos-x86_64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    name: windows-x86_64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - if: ${{ matrix.cross }}
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - run: cargo build -p meco-cabi --release --target ${{ matrix.target }}
      - name: stage
        shell: bash
        run: |
          d=meco-c-${{ matrix.name }}; mkdir -p "$d"
          cp crates/meco-cabi/meco.h "$d"/
          cp target/${{ matrix.target }}/release/*meco.* "$d"/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with: { name: "meco-c-${{ matrix.name }}", path: "meco-c-${{ matrix.name }}" }

  # WebAssembly npm package as a downloadable tarball (`npm install ./meco-wasm-*.tgz`).
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "wasm32-unknown-unknown" }
      - run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - run: wasm-pack build crates/meco-wasm --target web --out-name meco
      - run: cd crates/meco-wasm/pkg && npm pack && mv *.tgz "$GITHUB_WORKSPACE/"
      - uses: actions/upload-artifact@v4
        with: { name: meco-wasm-npm, path: "*.tgz" }

  # Apple xcframeworks: Swift (UniFFI) for Swift apps, and the C ABI for Objective-C / C.
  apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,aarch64-apple-darwin" }
      - name: Swift xcframework (UniFFI)
        run: |
          cargo build -p meco-uniffi --release --target aarch64-apple-ios
          cargo build -p meco-uniffi --release --target aarch64-apple-ios-sim
          cargo run -p meco-uniffi --bin uniffi-bindgen -- generate \
            --library target/aarch64-apple-ios/release/libmeco_uniffi.dylib --language swift --out-dir sw
          mkdir -p hdr && cp sw/*.h sw/*.modulemap hdr/
          xcodebuild -create-xcframework \
            -library target/aarch64-apple-ios/release/libmeco_uniffi.a -headers hdr \
            -library target/aarch64-apple-ios-sim/release/libmeco_uniffi.a -headers hdr \
            -output MecoSwift.xcframework
          zip -r MecoSwift.xcframework.zip MecoSwift.xcframework sw/meco_uniffi.swift
      - name: C ABI xcframework (ObjC / C)
        run: |
          cargo build -p meco-cabi --release --target aarch64-apple-ios
          cargo build -p meco-cabi --release --target aarch64-apple-ios-sim
          mkdir -p ch && cp crates/meco-cabi/meco.h ch/
          printf 'module Meco { header "meco.h"\n export * }\n' > ch/module.modulemap
          xcodebuild -create-xcframework \
            -library target/aarch64-apple-ios/release/libmeco.a -headers ch \
            -library target/aarch64-apple-ios-sim/release/libmeco.a -headers ch \
            -output MecoC.xcframework
          zip -r MecoC.xcframework.zip MecoC.xcframework
      - uses: actions/upload-artifact@v4
        with: { name: meco-apple, path: "*.xcframework.zip" }

  # Android AAR (UniFFI Kotlin + cargo-ndk .so for all ABIs).
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android" }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 17 }
      - uses: gradle/actions/setup-gradle@v4
      - uses: nttld/setup-ndk@v1
        with: { ndk-version: r26d, add-to-path: true }
      - run: cargo install cargo-ndk
      - run: |
          cargo ndk -t arm64-v8a -t armeabi-v7a -t x86_64 \
            -o bindings/android/src/main/jniLibs build -p meco-uniffi --release
          cargo run -p meco-uniffi --bin uniffi-bindgen -- generate \
            --library target/aarch64-linux-android/release/libmeco_uniffi.so \
            --language kotlin --out-dir bindings/android/src/main/kotlin
          cd bindings/android && gradle assembleRelease
      - uses: actions/upload-artifact@v4
        with: { name: meco-android-aar, path: bindings/android/build/outputs/aar/*.aar }

  # Gather everything and cut a downloadable GitHub Release.
  release:
    needs: [c-libs, wasm, apple, android]
    if: always() # publish whatever built — a single failing platform shouldn't block the release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: zip per-platform C libs
        run: |
          cd artifacts
          for d in meco-c-*; do zip -r "../$d.zip" "$d"; done
          cd ..
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            meco-c-*.zip
            artifacts/meco-wasm-npm/*.tgz
            artifacts/meco-apple/*.zip
            artifacts/meco-android-aar/*.aar
